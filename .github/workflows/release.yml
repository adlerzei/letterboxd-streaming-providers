name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Write API config
        run: |
          python3 -c "
          import base64, os, json, secrets, hashlib
          token = os.environ['TMDB_TOKEN']
          nonce = secrets.token_hex(16)
          pepper = 'LSP::tmdb::v1'
          key_bytes = hashlib.sha256((pepper + nonce).encode()).digest()
          obfuscated = base64.b64encode(bytes([c ^ key_bytes[i % len(key_bytes)] for i, c in enumerate(token.encode())])).decode()
          print(json.dumps({'tmdb': obfuscated, 'nonce': nonce}))
          " > extension/settings/api.json
        env:
          TMDB_TOKEN: ${{ secrets.TMDB_TOKEN }}

      - name: Build extension
        run: bash tools/build.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            builds/*.xpi
            builds/*.zip
          draft: true
          generate_release_notes: true
